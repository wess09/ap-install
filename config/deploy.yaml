Deploy:
  Git:
    # AzurPilot 仓库地址
    # URL of AzurPilot repository
    # [国内用户] 使用 'git://git.pull/AzurPilot' 获得更快更稳定的下载
    # [CN user] Use 'git://git.pull/AzurPilot' for faster and more stable download
    # [其他用户] 使用 'https://github.com/wess09/AzurPilot'
    # [Other] Use 'https://github.com/wess09/AzurPilot'
    Repository: git://git.pull/AzurPilot
    # AzurPilot 分支
    # Branch of AzurPilot
    # [开发者] 使用 'dev'、'app' 等分支体验新功能
    # [Developer] Use 'dev', 'app', etc, to try new features
    # [其他用户] 使用 'master'，稳定分支
    # [Other] Use 'master', the stable branch
    Branch: master
    # Git 可执行文件路径
    # Filepath of git executable.
    GitExecutable: ./.venv/Scripts/git/cmd/git.exe
    # 设置 Git 代理
    # Set git proxy
    # [国内用户] 使用本地 http 代理 (http://127.0.0.1:{port}) 或 socks5 代理 (socks5://127.0.0.1:{port})
    # [CN user] Use your local http proxy (http://127.0.0.1:{port}) or socks5 proxy (socks5://127.0.0.1:{port})
    # [其他用户] 使用 null
    # [Other] Use null
    GitProxy: null
    # 设置 SSL 验证
    # Set SSL Verify
    # [大多数情况] 使用 true
    # [In most cases] Use true
    # [其他情况] 连接到不受信任的网络时使用 false
    # [Other] Use false to when connected to an untrusted network
    SSLVerify: true
    # 启动时自动更新 AzurPilot
    # Update AzurPilot at startup
    # [大多数情况] 使用 true
    # [In most cases] Use true
    AutoUpdate: true

  Python:
    # Python 可执行文件路径
    # Filepath of python executable.
    PythonExecutable: ./.venv/Scripts/python.exe
    # PyPI 镜像地址
    # URL of pypi mirror
    # [国内用户] 使用 'https://mirrors.aliyun.com/pypi/simple' 获得更快更稳定的下载
    # [CN user] Use 'https://mirrors.aliyun.com/pypi/simple' for faster and more stable download
    # [其他用户] 使用 null
    # [Other] Use null
    PypiMirror: https://mirrors.aliyun.com/pypi/simple
    # 启动时安装依赖
    # Install dependencies at startup
    # [大多数情况] 使用 true
    # [In most cases] Use true
    InstallDependencies: true

  Adb:
    # ADB 可执行文件路径
    # Filepath of ADB executable.
    AdbExecutable: ./.venv/Scripts/adb.exe
    # 是否替换 ADB
    # Whether to replace ADB
    # 国产模拟器（夜神、雷电、逍遥、MuMu）使用自带的 ADB，而非最新版本。
    # Chinese emulators (NoxPlayer, LDPlayer, MemuPlayer, MuMuPlayer) use their own ADB, instead of the latest.
    # 不同的 ADB 服务器会在启动时互相终止，导致连接断开。
    # Different ADB servers will terminate each other at startup, resulting in disconnection.
    # 为了兼容性，必须全部替换。
    # For compatibility, we have to replace them all.
    # 替换操作将执行：
    # This will do:
    #   1. 终止当前 ADB 服务器
    #   1. Terminate current ADB server
    #   2. 将所有模拟器的 ADB 重命名为 *.bak，并用上面设置的 AdbExecutable 替换
    #   2. Rename ADB from all emulators to *.bak and replace them by the AdbExecutable set above
    #   3. 暴力连接所有可用的模拟器实例
    #   3. Brute-force connect to all available emulator instances
    # [大多数情况] 使用 true
    # [In most cases] Use true
    # [少数情况] 如果有其他程序使用 ADB，使用 false
    # [In few cases] Use false, if you have other programs using ADB.
    ReplaceAdb: true
    # 暴力连接所有可用的模拟器实例
    # Brute-force connect to all available emulator instances
    # [大多数情况] 使用 true
    # [In most cases] Use true
    AutoConnect: true
    # 重新安装 uiautomator2
    # Re-install uiautomator2
    # [大多数情况] 使用 true
    # [In most cases] Use true
    InstallUiautomator2: true

  Ocr:
    # 以服务方式运行 OCR，避免每次启动实例时都导入 mxnet，减少内存占用
    # Run Ocr as a service, can reduce memory usage by not import mxnet everytime you start an ap instance

    # 是否使用 OCR 服务器
    # Whether to use ocr server
    # [默认] false
    # [Default] false
    UseOcrServer: false
    # 启动 GUI 时是否同时启动 OCR 服务器
    # Whether to start ocr server when start GUI
    # [默认] false
    # [Default] false
    StartOcrServer: false
    # GUI 运行的 OCR 服务器端口
    # Port of ocr server runs by GUI
    # [默认] 22268
    # [Default] 22268
    OcrServerPort: 22268
    # 实例连接 OCR 服务器的地址
    # Address of ocr server for ap instance to connect
    # [默认] 127.0.0.1:22268
    # [Default] 127.0.0.1:22268
    OcrClientAddress: 127.0.0.1:22268

  Update:
    # 启用自动更新和内置更新功能
    # Use auto update and builtin updater feature
    # 可能会引发问题 https://github.com/wess09/AzurPilot/issues/876
    # This may cause problem https://github.com/wess09/AzurPilot/issues/876
    EnableReload: true
    # 每隔 X 分钟检查更新
    # Check update every X minute
    # [禁用] 0
    # [Disable] 0
    # [默认] 5
    # [Default] 5
    CheckUpdateInterval: 5
    # 定时重启时间
    # Scheduled restart time
    # 如果有更新，AzurPilot 会在此时间每天自动重启并更新，
    # 并恢复重启前正在运行的所有实例
    # If there are updates, AzurPilot will automatically restart and update at this time every day
    # and run all ap instances that running before restarted
    # [禁用] null
    # [Disable] null
    # [默认] 08:00
    # [Default] 08:00
    AutoRestartTime: 08:00

  Misc:
    # 启用 Discord 富状态展示
    # Enable discord rich presence
    DiscordRichPresence: false

  RemoteAccess:
    # 启用远程访问（使用 https://github.com/wang0618/localshare 提供的 SSH 反向隧道服务）
    # Enable remote access (using ssh reverse tunnel serve by https://github.com/wang0618/localshare)
    # ! 你必须在下方设置密码才能启用远程访问，否则任何拥有你链接的人都可以访问你的实例。
    # ! You need to set Password below to enable remote access since everyone can access to your ap if they have your url.
    # 详情请参阅 https://app.azurlane.cloud/
    # See here (http://app.azurlane.cloud/en.html) for more infomation.
    EnableRemoteAccess: true
    # SSH 服务器登录用户名
    # Username when login into ssh server
    # [默认] null（启动时会随机生成一个）
    # [Default] null (will generate a random one when startup)
    SSHUser: null
    # 要连接的服务器
    # Server to connect
    # [默认] null
    # [Default] null
    # [格式] host:port
    # [Format] host:port
    SSHServer: remote.nanoda.work:1022
    # SSH 可执行文件 `ssh.exe` 的路径
    # Filepath of SSH executable `ssh.exe`
    # [默认] ssh（在系统 PATH 中查找）
    # [Default] ssh (find ssh in system PATH)
    # 如果没有，请安装 OpenSSH 或在此下载 (https://github.com/PowerShell/Win32-OpenSSH/releases)
    # If you don't have one, install OpenSSH or download it here (https://github.com/PowerShell/Win32-OpenSSH/releases)
    SSHExecutable: ssh

  Webui:
    # --host. 监听的主机地址
    # --host. Host to listen
    # [使用 IPv6] '::'
    # [Use IPv6] '::'
    # [大多数情况] 默认 '0.0.0.0'
    # [In most cases] Default to '0.0.0.0'
    WebuiHost: 0.0.0.0
    # --port. 监听的端口
    # --port. Port to listen
    # 可通过 `http://{host}:{port}` 访问 WebUI
    # You will be able to access webui via `http://{host}:{port}`
    # [大多数情况] 默认 25548
    # [In most cases] Default to 25548
    WebuiPort: 25548
    # WebUI 使用的语言
    # Language to use on web ui
    # 'zh-CN' 简体中文
    # 'zh-CN' for Chinese simplified
    # 'en-US' English
    # 'en-US' for English
    # 'ja-JP' 日本語
    # 'ja-JP' for Japanese
    # 'zh-TW' 繁體中文
    # 'zh-TW' for Chinese traditional
    Language: zh-CN
    # WebUI 主题
    # Theme of web ui
    # 'default' 亮色主题
    # 'default' for light theme
    # 'dark' 暗色主题
    # 'dark' for dark theme
    Theme: default
    # 跟随系统 DPI 缩放
    # Follow system DPI scaling
    # [大多数情况] true
    # [In most cases] true
    # [少数情况] 如果你的屏幕分辨率低但 DPI 缩放高，使用 false 可以让 AzurPilot 显示得更小
    # [In few cases] false to make AzurPilot smaller, if you have a low resolution but high DPI scaling.
    DpiScaling: true
    # --key. WebUI 密码
    # --key. Password of web ui
    # 将 AzurPilot 暴露到公网时很有用
    # Useful when expose AzurPilot to the public network
    Password: null
    # --cdn. 使用 jsdelivr CDN 加载 PyWebIO 静态文件（css、js）
    # --cdn. Use jsdelivr cdn for pywebio static files (css, js).
    # 'true' 使用 jsdelivr CDN
    # 'true' for jsdelivr cdn
    # 'false' 自动使用自托管 CDN
    # 'false' for self host cdn (automatically)
    # 'https://path.to.your/cdn' 使用自定义 CDN
    # 'https://path.to.your/cdn' to use custom cdn
    CDN: false
    # --run. 启动时自动运行指定的配置
    # --run. Auto-run specified config when startup
    # 'null' 默认不指定
    # 'null' default no specified config
    # '["ap"]' 指定 "ap" 配置
    # '["ap"]' specified "ap" config
    # '["ap","ap2"]' 指定 "ap" 和 "ap2" 配置
    # '["ap","ap2"]' specified "ap" "ap2" configs
    Run: null
    # SSL 支持
    # SSL support
    # 仅在以下两个参数都设置时生效
    # Only effective when both parameters below are set
    # --ssl-key. SSL 密钥文件路径
    # --ssl-key. Path to SSL key file
    # [默认] null（不使用 SSL）
    # [Default] null (no SSL)
    WebuiSSLKey: null
    # --ssl-cert. SSL 证书文件路径
    # --ssl-cert. Path to SSL cert file
    # [默认] null（不使用 SSL）
    # [Default] null (no SSL)
    WebuiSSLCert: null
